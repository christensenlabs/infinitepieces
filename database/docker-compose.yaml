services:
  postgres:
    container_name: infpieces-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infinitepieces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-admin}
      APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./create_roles.sql:/opt/infinitepieces/create_roles.sql:ro

volumes:
  pgdata:
